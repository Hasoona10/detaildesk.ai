<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Detailing Receptionist · Chat Smoke Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f8fafc;
            color: #0f172a;
        }
        .test-info {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 4px rgba(15,23,42,0.08);
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .status.success { background: #dcfce7; color: #166534; }
        .status.error   { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="test-info">
        <h1>AI Detailing Receptionist · Chat Smoke Test</h1>
        <p>This page just loads the embedded chat widget against the local backend. Try asking:</p>
        <ul>
            <li>"Do you guys do ceramic coating?"</li>
            <li>"How much for a full detail on a Tesla Model 3?"</li>
            <li>"Can you come to my place in Irvine on Saturday?"</li>
        </ul>
        <div id="status"></div>
    </div>

    <script>
        window.AIReceptionistConfig = {
            apiUrl: 'http://127.0.0.1:8000',
            businessId: 'oc_elite_detailing',
            businessName: 'OC Elite Detailing',
            position: 'bottom-right',
            greeting: 'Hi — what vehicle are we helping you with today?'
        };

        window.addEventListener('load', () => {
            const statusDiv = document.getElementById('status');
            setTimeout(() => {
                if (window.AIReceptionist) {
                    statusDiv.innerHTML = '<div class="status success">Widget loaded successfully. Open the chat bubble in the bottom-right.</div>';
                } else {
                    statusDiv.innerHTML = '<div class="status error">Widget failed to load. Is the backend running on http://127.0.0.1:8000?</div>';
                }
            }, 1000);
        });
    </script>
    <script src="http://127.0.0.1:8000/widget/widget.js"></script>
</body>
</html>
